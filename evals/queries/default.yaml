# Default retrieval-quality query bank for github-twin.
#
# Tune to your own corpus: run `gt eval search evals/queries/default.yaml`
# and edit / replace queries that don't match what you care about.
# Each query is evaluated under bm25-only, vector-only, and hybrid modes.
#
# Tier targets enforced by `render_search_result`:
#   1 — must hit 100% (CLI exits non-zero on miss)
#   2 — should hit ≥85%
#   3 — aspirational, ≥70%
#
# An `expect_any` clause passes if ANY listed field matches ANY of the
# top-k returned hits. Fields:
#   artifact_id, chunk_id      — exact IDs (drift between rebuilds; avoid)
#   path_substr                — substring in chunk.context.path
#   text_substr                — case-insensitive substring in chunk.text
#   url_substr                 — substring in source URL
#   symbol_name                — exact match on chunk.context.symbol_name
#   node_kind                  — exact match on chunk.context.node_kind

# ------------- Tier 1: critical, must pass -------------

- query: "renewal of vault secret lease"
  tool: find_style_examples
  tier: 1
  expect_any:
    - path_substr: "Vault.scala"

- query: "Eq instance for a wrapper case class"
  tool: find_style_examples
  tier: 1
  expect_any:
    - symbol_name: "VaultSecretEq"        # specific target: the exact wrapper Eq
    - path_substr: "VaultSecret.scala"    # broader: any chunk from that file
    - text_substr: "Eq["                  # topical: any Eq typeclass usage
                                          #   (e.g. `Eq[A]`, `Eq[T]` in cats scaffolding)

- query: "Tracer translate FunctionK natural transformation"
  tool: find_review_comments
  tier: 1
  expect_any:
    - text_substr: "Tracer.translate"     # exact identifier reference
    - url_substr: "Tracer"                # comment URL containing "Tracer"
    - path_substr: "Tracer"               # review comment on a file path containing
                                          #   "Tracer" (e.g. core/trace/.../Tracer.scala)

- query: "mapN parMapN accumulating errors"
  tool: find_review_comments
  tier: 1
  expect_any:
    - text_substr: "parMapN"
    - text_substr: "accumulation"

- query: "ember-core message Parser"
  tool: find_review_comments
  tier: 1
  expect_any:
    - path_substr: "ember-core"

