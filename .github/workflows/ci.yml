name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel any in-flight runs for the same branch/PR — saves Actions minutes
# when a PR is rebased quickly.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (python-${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history so hatch-vcs can read tags during build smoke-test
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --extra st --extra faiss --dev
      - name: Lint
        run: uv run ruff check src/ tests/
      - name: Format check
        # Enforces ruff format's canonical layout. Run `uv run ruff format
        # src/ tests/` locally to fix any complaint surfaced here.
        run: uv run ruff format --check src/ tests/
      - name: Type check
        # `mypy --strict` on src/github_twin/ only. Tests are not in scope —
        # see [tool.mypy] in pyproject.toml.
        run: uv run mypy
      - name: Tests
        run: uv run pytest -q
      - name: Build (smoke)
        run: uv build
        # Confirms the wheel still packages cleanly with hatch-vcs;
        # produces a fallback-versioned artifact (0.0.0+local on PRs).
